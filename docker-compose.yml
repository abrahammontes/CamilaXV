version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: camilaxv_web
    ports:
      - "80:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.api
    container_name: camilaxv_api
    command: node server.js
    ports:
      - "3001:3001"
    working_dir: /app
    volumes:
      - ./server:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/rsvps"]
      interval: 30s
      timeout: 10s
      retries: 3