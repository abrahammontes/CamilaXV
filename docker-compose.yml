version: '3.8'

networks:
  camilaxv_network:
    driver: bridge

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: camilaxv_web
    ports:
      - "80:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - camilaxv_network
    depends_on:
      - api

  api:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.api
    container_name: camilaxv_api
    working_dir: /app
    volumes:
      - ./server:/app
    restart: unless-stopped
    networks:
      - camilaxv_network
    command: node server.js