<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Camila XV</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red: #DC143C;
            --black: #0a0a0a;
            --dark: #111111;
            --white: #ffffff;
            --red-light: #ffcccc;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Cormorant Garamond', serif;
        }

        .header {
            background: var(--dark);
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(220, 20, 60, 0.3);
        }

        .header h1 {
            color: var(--red);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.7;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(17, 17, 17, 0.9);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            padding: 2rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(220, 20, 60, 0.2);
        }

        .card-header h2 {
            color: var(--red);
            font-size: 1.8rem;
        }

        .card-header .count {
            background: var(--red);
            color: var(--white);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 1rem;
        }

        .list {
            max-height: 400px;
            overflow-y: auto;
        }

        .list::-webkit-scrollbar {
            width: 6px;
        }

        .list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .list::-webkit-scrollbar-thumb {
            background: var(--red);
            border-radius: 3px;
        }

        .list-item {
            padding: 1rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border-left: 3px solid var(--red);
            transition: background 0.3s;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .list-item .name {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .list-item .details {
            font-size: 0.9rem;
            opacity: 0.7;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .list-item .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .badge.confirmed {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .badge.declined {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }

        .list-item .message {
            font-style: italic;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .list-item .song-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--red);
        }

        .list-item .artist {
            font-size: 1rem;
            opacity: 0.8;
        }

        .list-item .date {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            opacity: 0.5;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: var(--red);
            color: var(--white);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dashboard</h1>
        <p>Invitación XV Años - Camila Violeta</p>
    </div>

    <div class="container">
        <div class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <h2>Confirmaciones</h2>
                    <span class="count" id="rsvp-count">0</span>
                </div>
                <button class="refresh-btn" onclick="loadRSVPs()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Actualizar
                </button>
                <div id="rsvp-list" class="list">
                    <div class="loading">Cargando...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Canciones Sugeridas</h2>
                    <span class="count" id="song-count">0</span>
                </div>
                <button class="refresh-btn" onclick="loadSongs()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Actualizar
                </button>
                <div id="song-list" class="list">
                    <div class="loading">Cargando...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://xvdecamila.mipagina.pro';

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('es-MX', {
                day: 'numeric',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function loadRSVPs() {
            const listEl = document.getElementById('rsvp-list');
            const countEl = document.getElementById('rsvp-count');
            
            listEl.innerHTML = '<div class="loading">Cargando...</div>';
            
            try {
                const res = await fetch(`${API_URL}/api/rsvps`);
                const data = await res.json();
                
                countEl.textContent = data.length;
                
                if (data.length === 0) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                            </svg>
                            <p>No hay confirmaciones aún</p>
                        </div>
                    `;
                    return;
                }
                
                listEl.innerHTML = data.map(rsvp => `
                    <div class="list-item">
                        <div class="name">${rsvp.name}</div>
                        <div class="details">
                            <span class="badge ${rsvp.attending === 'yes' ? 'confirmed' : 'declined'}">
                                ${rsvp.attending === 'yes' ? 'Confirmado' : 'No puede'}
                            </span>
                            ${rsvp.guests > 0 ? `<span>${rsvp.guests} acompañante${rsvp.guests > 1 ? 's' : ''}</span>` : ''}
                        </div>
                        ${rsvp.message ? `<div class="message">"${rsvp.message}"</div>` : ''}
                        <div class="date">${formatDate(rsvp.created_at)}</div>
                    </div>
                `).join('');
            } catch (err) {
                listEl.innerHTML = '<div class="empty-state"><p>Error al cargar datos</p></div>';
            }
        }

        async function loadSongs() {
            const listEl = document.getElementById('song-list');
            const countEl = document.getElementById('song-count');
            
            listEl.innerHTML = '<div class="loading">Cargando...</div>';
            
            try {
                const res = await fetch(`${API_URL}/api/songs`);
                const data = await res.json();
                
                countEl.textContent = data.length;
                
                if (data.length === 0) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 18V5l12-2v13"/>
                                <circle cx="6" cy="18" r="3"/>
                                <circle cx="18" cy="16" r="3"/>
                            </svg>
                            <p>No hay canciones sugeridas aún</p>
                        </div>
                    `;
                    return;
                }
                
                listEl.innerHTML = data.map(song => `
                    <div class="list-item">
                        <div class="song-title">${song.song_name}</div>
                        <div class="artist">${song.artist}</div>
                        <div class="date">${formatDate(song.created_at)}</div>
                    </div>
                `).join('');
            } catch (err) {
                listEl.innerHTML = '<div class="empty-state"><p>Error al cargar datos</p></div>';
            }
        }

        loadRSVPs();
        loadSongs();
        
        setInterval(() => {
            loadRSVPs();
            loadSongs();
        }, 30000);
    </script>
</body>
</html>
